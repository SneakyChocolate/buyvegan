<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Rectangle Placer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f0f2f5;
        }
        .wrapper {
            position: relative;
            display: inline-block;
            margin-top: 15px;
            border: 2px solid #ccc;
        }
        #bg-img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        #myCanvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls {
            margin-bottom: 10px;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
        }
        #data-log {
            margin-top: 15px;
            width: 100%;
            max-width: 800px;
            height: 120px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h2>Canvas Image Annotation Tool</h2>

    <div class="wrapper">
        <!-- <img id="bg-img" src="./floorplan.png" alt="Floorplan background"> -->
        <canvas id="myCanvas" width="1585" height="600"></canvas>
    </div>

    <input type="text" id="desc">

    <script src="./areas.js"></script>
    <script src="./script.js"></script>
</body>
</html>
